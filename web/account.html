<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Account · Crypto Arb</title>
<link rel="stylesheet" href="/theme.css" />
<script src="/viewmode.js"></script>
<style>
  .auth-wrap { max-width: 440px; margin: 48px auto 80px; padding: 0 20px; }
  .auth-card { padding: 28px; }
  .auth-card h1 { margin: 0 0 6px; font-size: 26px; font-weight: 800; }
  .auth-card .sub { color: var(--muted); font-size: 14px; margin: 0 0 22px; line-height: 1.45; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 700; color: var(--muted-2); text-transform: uppercase; margin-bottom: 6px; }
  .field input { width: 100%; padding: 12px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); font-size: 15px; box-sizing: border-box; }
  .auth-msg { min-height: 20px; font-size: 13px; color: var(--red); margin: 10px 0; }
  .auth-msg.ok { color: var(--emerald); }
  .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .tabs button { flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: #fff; font-weight: 700; cursor: pointer; }
  .tabs button.on { background: var(--dark); color: #fff; border-color: var(--dark); }
  .twofa-box { display: none; margin-top: 8px; padding: 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface-2); }
  .twofa-box.show { display: block; }
  .secret-code { font-family: ui-monospace, monospace; font-size: 12px; word-break: break-all; background: #fff; padding: 8px; border-radius: 6px; margin: 8px 0; }
  .qr-wrap { text-align: center; margin: 12px 0 14px; }
  .qr-wrap img { display: block; margin: 0 auto; border: 1px solid var(--border); border-radius: 10px; background: #fff; padding: 10px; }
  .qr-link { font-size: 12px; word-break: break-all; text-align: center; }
</style>
</head>
<body>
<div id="appHeader"></div>
<div class="auth-wrap">
  <div class="card auth-card">
    <h1 id="authTitle">Sign in</h1>
    <p class="sub" id="authSub">Authenticator app (2FA) required — no password needed.</p>
    <div class="tabs" id="authTabs">
      <button type="button" id="tabLogin" class="on">Sign in</button>
      <button type="button" id="tabRegister">Register</button>
    </div>
    <form id="authForm">
      <div class="field" id="userField">
        <label for="username">Username</label>
        <input id="username" required minlength="2" maxlength="32" pattern="[A-Za-z0-9_-]+" autocomplete="username" />
      </div>
      <div class="twofa-box" id="twofaBox">
        <p style="margin:0 0 8px;font-size:13px;font-weight:700" id="twofaTitle">Authenticator code</p>
        <p class="sub" style="margin:0 0 10px" id="twofaHint">Enter the 6-digit code from your authenticator app.</p>
        <div id="setupInfo" style="display:none">
          <p class="sub" style="margin:0 0 10px;text-align:center">Scan with Google Authenticator, 1Password, or Authy:</p>
          <div class="qr-wrap" id="otpQrWrap" hidden>
            <img id="otpQr" alt="2FA setup QR code" width="200" height="200" />
          </div>
          <p class="qr-link"><a id="otpLink" href="#" target="_blank" rel="noopener">Can't scan? Open setup link</a></p>
          <p class="sub" style="margin:8px 0 4px">Or enter secret manually:</p>
          <div class="secret-code" id="otpSecret"></div>
        </div>
        <div class="field">
          <label for="totpCode">6-digit code</label>
          <input id="totpCode" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" autocomplete="one-time-code" placeholder="000000" />
        </div>
      </div>
      <div class="auth-msg" id="authMsg"></div>
      <button class="btn" type="submit" style="width:100%" id="authSubmit">Sign In</button>
    </form>
    <p style="margin-top:16px;font-size:13px;color:var(--muted);text-align:center">
      <a href="/autopilot">Autopilot →</a>
    </p>
  </div>
</div>
<script src="/header.js?v=4" defer></script>
<script src="/auth-ui.js?v=7" defer></script>
<script defer>
document.addEventListener("DOMContentLoaded", function () {
  if (window.AccountAuth) AccountAuth.boot();
});
</script>
</body>
</html>
